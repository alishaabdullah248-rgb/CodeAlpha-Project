<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Gallery | Premium Image Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-camera-retro"></i>
                <span>NEXUS<span class="logo-light">GALLERY</span></span>
            </div>
            <div class="nav-links">
                <a href="#" class="nav-link active">Home</a>
                <a href="#">Collections</a>
                <a href="#">Exhibitions</a>
                <a href="#">Contact</a>
            </div>
            <div class="nav-icons">
                <i class="fas fa-search"></i>
                <i class="fas fa-user"></i>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <div class="hero-badge">EST. 2024</div>
            <h1 class="hero-title">
                Where <span class="gradient-text">Moments</span><br>
                Become Eternal
            </h1>
            <p class="hero-subtitle">Curated collection of extraordinary visuals from visionary artists worldwide</p>
            <div class="hero-stats">
                <div class="stat">
                    <span class="stat-number">250+</span>
                    <span class="stat-label">Exclusive Works</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat">
                    <span class="stat-number">45+</span>
                    <span class="stat-label">Artists</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat">
                    <span class="stat-number">12K</span>
                    <span class="stat-label">Collectors</span>
                </div>
            </div>
        </div>
        <div class="hero-scroll">
            <span>Scroll to explore</span>
            <i class="fas fa-chevron-down"></i>
        </div>
    </section>

    <!-- Filter Section -->
    <div class="filter-wrapper">
        <div class="filter-container">
            <div class="filter-label">
                <i class="fas fa-sliders-h"></i>
                <span>Filter by</span>
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">
                    <i class="fas fa-th-large"></i>
                    <span>All Works</span>
                </button>
                <button class="filter-btn" data-filter="nature">
                    <i class="fas fa-leaf"></i>
                    <span>Nature</span>
                </button>
                <button class="filter-btn" data-filter="city">
                    <i class="fas fa-city"></i>
                    <span>Urban</span>
                </button>
                <button class="filter-btn" data-filter="animals">
                    <i class="fas fa-paw"></i>
                    <span>Wildlife</span>
                </button>
            </div>
            <div class="filter-view">
                <i class="fas fa-th"></i>
                <i class="fas fa-th-list"></i>
            </div>
        </div>
    </div>

    <!-- Gallery Grid -->
    <div class="gallery-container">
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="closeLightbox">
            <i class="fas fa-times"></i>
        </button>
        <button class="lightbox-nav prev" id="prevImage">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="lightbox-nav next" id="nextImage">
            <i class="fas fa-chevron-right"></i>
        </button>
        <div class="lightbox-content">
            <img src="" alt="" id="lightboxImage">
            <div class="lightbox-info">
                <div class="lightbox-title" id="lightboxTitle"></div>
                <div class="lightbox-category" id="lightboxCategory"></div>
            </div>
        </div>
        <div class="lightbox-counter" id="lightboxCounter"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
